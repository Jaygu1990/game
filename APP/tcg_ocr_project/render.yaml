services:
  - type: web
    name: tcg-ocr-api
    env: python
    pythonVersion: "3.11"
    rootDir: APP/tcg_ocr_project
    buildCommand: |
      set -e &&
      echo "=== 开始构建 ===" &&
      echo "当前目录: $(pwd)" &&
      echo "=== 检查 PaddleOCR ===" &&
      PADDLEOCR_DIR="APP/tcg_ocr_project/PaddleOCR" &&
      echo "检查 PaddleOCR 目录: $PADDLEOCR_DIR" &&
      if [ ! -d "$PADDLEOCR_DIR" ]; then
        echo "❌ 错误: PaddleOCR 目录不存在！" &&
        echo "请确保 PaddleOCR 目录已添加到 Git 仓库中" &&
        echo "期望路径: $PADDLEOCR_DIR" &&
        exit 1
      fi &&
      if [ ! -d "$PADDLEOCR_DIR/ppocr/modeling" ]; then
        echo "❌ 错误: PaddleOCR 目录不完整（缺少 ppocr/modeling）！" &&
        echo "请确保 PaddleOCR 目录完整，包含 ppocr/modeling 子目录" &&
        exit 1
      fi &&
      echo "✅ PaddleOCR 目录检查通过" &&
      echo "=== 安装依赖 ===" &&
      cd APP/tcg_ocr_project/server && 
      pip install --upgrade pip &&
      pip cache purge || true &&
      pip install --no-cache-dir --no-deps fastapi==0.104.1 "uvicorn[standard]==0.24.0" python-multipart==0.0.6 "numpy>=2.0.0" paddlepaddle==2.6.2 pyyaml==6.0.1 torch==2.5.1 torchvision==0.20.1 ultralytics==8.1.0 pillow==10.1.0 "shapely>=2.1.0" "opencv-python>=4.13.0" &&
      pip install --no-cache-dir "paddleocr>=2.7.0"
    startCommand: cd server && python server.py
    envVars:
      - key: PORT
        value: 8000
      - key: MAX_WORKERS
        value: 2
      - key: MAX_QUEUE_SIZE
        value: 100
      - key: REQUEST_TIMEOUT
        value: 60
      - key: QUEUE_WAIT_TIMEOUT
        value: 300
      - key: USE_GPU
        value: false
      - key: UVICORN_WORKERS
        value: 1
