services:
  - type: web
    name: tcg-ocr-api
    env: python
    pythonVersion: "3.11"
    rootDir: APP/tcg_ocr_project
    buildCommand: |
      git submodule update --init --recursive || echo "Submodule update failed, trying direct clone..." &&
      if [ ! -d "PaddleOCR" ] && [ ! -d "APP/tcg_ocr_project/PaddleOCR" ]; then 
        echo "Cloning PaddleOCR repository..." && 
        git clone --depth 1 https://github.com/PaddlePaddle/PaddleOCR.git APP/tcg_ocr_project/PaddleOCR || 
        git clone --depth 1 https://github.com/PaddlePaddle/PaddleOCR.git PaddleOCR || 
        echo "Failed to clone PaddleOCR"; 
      fi &&
      cd server && pip install -r requirements_server.txt
    startCommand: cd server && python server.py
    envVars:
      - key: PORT
        value: 8000
      - key: MAX_WORKERS
        value: 4
      - key: MAX_QUEUE_SIZE
        value: 100
      - key: REQUEST_TIMEOUT
        value: 60
      - key: QUEUE_WAIT_TIMEOUT
        value: 300
      - key: USE_GPU
        value: false
      - key: UVICORN_WORKERS
        value: 1
