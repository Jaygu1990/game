Global:
  debug: false
  use_gpu: true
  epoch_num: 100
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: C:\Users\jxguw\Desktop\Shopify\APP\tcg_ocr_project\data\ocr_train\code\models
  save_epoch_step: 5
  eval_batch_step: 100
  cal_metric_during_train: true
  pretrained_model: null
  checkpoints: null
  save_inference_dir: null
  use_visualdl: false
  infer_img: null
  character_dict_path: C:\Users\jxguw\Desktop\Shopify\APP\tcg_ocr_project\data\ocr_train\code\code_dict.txt
  max_text_length: 25
  infer_mode: false
  use_space_char: false
  distributed: false
  save_res_path: C:\Users\jxguw\Desktop\Shopify\APP\tcg_ocr_project\data\ocr_train\code\log\train.log
Train:
  dataset:
    name: SimpleDataSet
    data_dir: ''
    label_file_list:
    - C:\Users\jxguw\Desktop\Shopify\APP\tcg_ocr_project\data\ocr_train\code\train_list.txt
    transforms:
    - DecodeImage:
        img_mode: GRAY
        channel_first: false
        del_file: false
    - MultiLabelEncode: {}
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_sar
        - length
  loader:
    shuffle: true
    batch_size_per_card: 256
    drop_last: true
    num_workers: 4
Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ''
    label_file_list:
    - C:\Users\jxguw\Desktop\Shopify\APP\tcg_ocr_project\data\ocr_train\code\val_list.txt
    transforms:
    - DecodeImage:
        img_mode: GRAY
        channel_first: false
        del_file: false
    - MultiLabelEncode: {}
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_sar
        - length
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 256
    num_workers: 4
Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform: null
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
    - CTCHead:
        Neck:
          name: svtr
          dims: 120
          depth: 2
          hidden_dims: 120
          kernel_size:
          - 1
          - 3
          use_guide: true
        Head:
          fc_decay: 1.0e-05
    - NRTRHead:
        nrtr_dim: 384
        max_text_length: 25
Loss:
  name: MultiLoss
  loss_config_list:
  - CTCLoss: null
  - NRTRLoss: null
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0005
    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 3.0e-05
PostProcess:
  name: CTCLabelDecode
Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: false
